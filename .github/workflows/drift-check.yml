name: Config Drift Check

on:
  pull_request:
    branches: [main, master, develop]

jobs:
  drift-detection:
    runs-on: ubuntu-latest
    name: Detect Code-to-Config Drift

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Config Drift Detector
        uses: ./action
        with:
          source-paths: 'demo/myapp/src/'
          config-paths: 'demo/myapp/config/'
          languages: 'python'
          fail-on-drift: 'true'
          skip-unused: 'false'
          driftignore: '.driftignore'
