version: '3.8'
services:
  app:
    image: myapp:latest
    environment:
      - DATABASE_URL=postgres://db:5432/myapp
      - API_KEY=key-abc123
      - REDIS_HOST=redis
      - SMTP_PORT=587
      - S3_BUCKET=my-bucket
      - REQUEST_TIMEOUT=30
      # SECRET_KEY missing!
      # JWT_SECRET missing!
      # RETRY_COUNT missing!
